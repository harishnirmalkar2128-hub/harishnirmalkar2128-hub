name: Generate Snake (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: harishnirmalkar2128-hub
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://github.com/harishnirmalkar2128-hub/harishnirmalkar2128-hub.git --branch output --single-branch output-branch || git init output-branch
          cd output-branch
          git checkout output || git checkout --orphan output
          rm -rf *
          cp -r ../dist/* .
          git add .
          git commit -m "Update snake animation"
          git push origin output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
